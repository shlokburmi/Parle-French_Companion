<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parle — French Language Companion</title>
  <meta name="description" content="Parle is a visually stunning French language learning companion. Scan images, practice conversation with AI, and track your fluency." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS — PARISIAN INK
       ═══════════════════════════════════════════ */
    :root {
      --bg:        #0e0e0e;
      --card:      #161616;
      --card-alt:  #1c1c1c;
      --cream:     #f0e6c8;
      --gold:      #c9a84c;
      --gold-dim:  #a07e2e;
      --red:       #d94040;
      --red-glow:  rgba(217, 64, 64, .45);
      --amber:     #e8a030;
      --green:     #4caf7a;
      --muted:     #8a8272;
      --muted-dim: #5a5549;
      --serif:     'Playfair Display', Georgia, serif;
      --mono:      'DM Mono', 'Courier New', monospace;
      --ease:      cubic-bezier(.4, 0, .2, 1);
      --radius:    12px;
      --max-w:     480px;
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--mono);
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: .045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }

    /* ═══════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════ */
    #app {
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 24px 20px 60px;
      position: relative;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════
       SCREEN TRANSITIONS
       ═══════════════════════════════════════════ */
    .screen {
      display: none;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .4s var(--ease), transform .4s var(--ease);
    }
    .screen.active {
      display: block;
    }
    .screen.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ═══════════════════════════════════════════
       TYPOGRAPHY
       ═══════════════════════════════════════════ */
    h1, h2, h3 { font-family: var(--serif); font-weight: 700; line-height: 1.15; }

    .brand {
      text-align: center;
      padding: 32px 0 8px;
    }
    .brand h1 {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--cream) 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }
    .brand h1::after {
      content: 'Parle';
      position: absolute;
      inset: 0;
      font-family: var(--serif);
      font-weight: 800;
      font-size: 3.2rem;
      letter-spacing: -.03em;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 1px rgba(240,230,200,.06);
      transform: translate(3px, 3px);
      z-index: -1;
    }
    .brand .tagline {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .section-title {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: var(--cream);
    }
    .section-sub {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .06em;
      margin-bottom: 28px;
    }

    /* ═══════════════════════════════════════════
       DIAGONAL DIVIDER
       ═══════════════════════════════════════════ */
    .divider {
      width: 100%;
      height: 40px;
      margin: 28px 0 20px;
      position: relative;
      overflow: hidden;
    }
    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: -5%;
      width: 110%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-dim) 50%, transparent 100%);
      transform: rotate(-3deg);
    }

    /* ═══════════════════════════════════════════
       CARD
       ═══════════════════════════════════════════ */
    .card {
      background: var(--card);
      border: 1px solid rgba(240,230,200,.06);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 16px;
    }

    /* ═══════════════════════════════════════════
       API KEY INPUT
       ═══════════════════════════════════════════ */
    #api-key-section {
      margin-bottom: 24px;
    }
    #api-key-section label {
      display: block;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .api-key-row {
      display: flex;
      gap: 8px;
    }
    .api-key-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid rgba(240,230,200,.1);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--cream);
      font-family: var(--mono);
      font-size: .82rem;
      outline: none;
      transition: border-color .3s;
    }
    .api-key-row input:focus {
      border-color: var(--gold);
    }
    .api-key-row button {
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-family: var(--mono);
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .3s, transform .15s;
      white-space: nowrap;
    }
    .api-key-row button:hover { background: var(--cream); }
    .api-key-row button:active { transform: scale(.96); }
    .api-key-status {
      font-size: .72rem;
      margin-top: 6px;
      color: var(--green);
      min-height: 18px;
    }

    /* ═══════════════════════════════════════════
       DROP ZONE
       ═══════════════════════════════════════════ */
    #drop-zone {
      border: 2px dashed rgba(240,230,200,.12);
      border-radius: var(--radius);
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .3s, background .3s;
      position: relative;
      overflow: hidden;
    }
    #drop-zone:hover,
    #drop-zone.dragover {
      border-color: var(--gold);
      background: rgba(201,168,76,.04);
    }
    #drop-zone .drop-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      opacity: .6;
    }
    #drop-zone .drop-text {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.6;
    }
    #drop-zone .drop-text strong {
      color: var(--gold);
    }
    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    #image-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
      border: 1px solid rgba(240,230,200,.08);
    }

    /* ═══════════════════════════════════════════
       PROGRESS BAR (OCR)
       ═══════════════════════════════════════════ */
    .ocr-progress-wrap {
      margin-top: 20px;
      display: none;
    }
    .ocr-progress-wrap .label {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .ocr-progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(240,230,200,.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .ocr-progress-bar .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--cream));
      border-radius: 4px;
      transition: width .3s;
    }

    /* ═══════════════════════════════════════════
       WORD PILLS
       ═══════════════════════════════════════════ */
    #words-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      min-height: 0;
    }
    .word-pill {
      display: inline-block;
      background: rgba(201,168,76,.1);
      border: 1px solid rgba(201,168,76,.2);
      color: var(--gold);
      font-family: var(--mono);
      font-size: .78rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 100px;
      opacity: 0;
      transform: translateY(12px) scale(.92);
      animation: pillIn .45s var(--ease) forwards;
    }
    @keyframes pillIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ═══════════════════════════════════════════
       BUTTONS
       ═══════════════════════════════════════════ */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: var(--bg);
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .2s, box-shadow .3s;
      letter-spacing: .02em;
      margin-top: 24px;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,168,76,.2);
    }
    .btn-primary:active { transform: scale(.97); }
    .btn-primary:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      display: block;
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--gold);
      border: 1.5px solid var(--gold-dim);
      border-radius: var(--radius);
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .3s, color .3s, transform .2s;
      margin-top: 12px;
    }
    .btn-secondary:hover {
      background: rgba(201,168,76,.08);
      transform: translateY(-1px);
    }

    /* ═══════════════════════════════════════════
       SCREEN 2 — CONVERSATION
       ═══════════════════════════════════════════ */
    .round-indicator {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 24px;
    }
    .round-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .round-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(240,230,200,.12);
      transition: background .3s, transform .3s;
    }
    .round-dot.done { background: var(--green); }
    .round-dot.current {
      background: var(--gold);
      transform: scale(1.3);
    }

    .sentence-display {
      text-align: center;
      padding: 32px 16px;
    }
    .sentence-fr {
      font-family: var(--serif);
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--cream);
      margin-bottom: 12px;
      min-height: 2.5em;
    }
    .sentence-en {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.5;
      min-height: 1.5em;
    }

    /* Mic button */
    .mic-wrap {
      display: flex;
      justify-content: center;
      padding: 24px 0;
    }
    .mic-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      background: linear-gradient(135deg, var(--red), #b02828);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s, box-shadow .3s;
      box-shadow: 0 4px 24px var(--red-glow);
    }
    .mic-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 40px var(--red-glow);
    }
    .mic-btn:active { transform: scale(.95); }
    .mic-btn svg { width: 32px; height: 32px; fill: currentColor; }

    .mic-btn.recording {
      animation: micPulse 1.2s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%   { box-shadow: 0 0 0 0 var(--red-glow), 0 0 24px var(--red-glow); }
      50%  { box-shadow: 0 0 0 18px rgba(217,64,64,0), 0 0 40px rgba(232,160,48,.3); }
      100% { box-shadow: 0 0 0 0 var(--red-glow), 0 0 24px var(--red-glow); }
    }

    .mic-label {
      text-align: center;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* User transcript */
    .user-transcript {
      text-align: center;
      margin-top: 20px;
      min-height: 48px;
    }
    .user-transcript .label {
      font-size: .68rem;
      color: var(--muted-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .user-transcript .text {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--cream);
      opacity: .85;
      min-height: 1.4em;
    }

    /* Feedback card */
    .feedback-card {
      background: var(--card-alt);
      border: 1px solid rgba(201,168,76,.1);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 20px;
      display: none;
      animation: fadeUp .4s var(--ease);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .feedback-card .score-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .feedback-card .score-ring {
      flex-shrink: 0;
    }
    .feedback-card .score-label {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .feedback-card .score-value {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--gold);
    }
    .feedback-card .fb-text {
      font-size: .82rem;
      color: var(--cream);
      opacity: .85;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .feedback-card .fb-tip {
      font-size: .76rem;
      color: var(--gold);
      line-height: 1.5;
      padding: 10px 14px;
      background: rgba(201,168,76,.06);
      border-radius: 8px;
      border-left: 3px solid var(--gold-dim);
    }

    .btn-next-round {
      margin-top: 16px;
    }

    /* Text input fallback */
    .text-fallback {
      display: none;
      margin-top: 16px;
    }
    .text-fallback input {
      width: 100%;
      background: var(--bg);
      border: 1px solid rgba(240,230,200,.1);
      border-radius: 8px;
      padding: 14px;
      color: var(--cream);
      font-family: var(--mono);
      font-size: .88rem;
      outline: none;
      transition: border-color .3s;
    }
    .text-fallback input:focus { border-color: var(--gold); }
    .text-fallback .submit-text {
      margin-top: 8px;
      width: 100%;
      padding: 12px;
      background: rgba(201,168,76,.12);
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: var(--mono);
      font-size: .82rem;
      cursor: pointer;
      transition: background .3s;
    }
    .text-fallback .submit-text:hover { background: rgba(201,168,76,.2); }

    /* ═══════════════════════════════════════════
       SCREEN 3 — SUMMARY
       ═══════════════════════════════════════════ */
    .summary-hero {
      text-align: center;
      padding: 32px 0;
    }
    .summary-hero .big-score {
      font-family: var(--mono);
      font-size: 4rem;
      font-weight: 500;
      color: var(--gold);
      line-height: 1;
    }
    .summary-hero .big-score-label {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .score-ring-big {
      margin: 0 auto 16px;
    }

    .summary-list {
      list-style: none;
    }
    .summary-item {
      background: var(--card);
      border: 1px solid rgba(240,230,200,.06);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(12px);
      animation: pillIn .4s var(--ease) forwards;
    }
    .summary-item .si-round {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--muted-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .summary-item .si-fr {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .summary-item .si-user {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--muted);
      font-style: italic;
    }
    .summary-item .si-score {
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--gold);
      margin-top: 6px;
    }

    /* ═══════════════════════════════════════════
       TOAST
       ═══════════════════════════════════════════ */
    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      width: calc(100% - 40px);
      max-width: 420px;
      pointer-events: none;
    }
    .toast {
      background: var(--card-alt);
      border: 1px solid rgba(217,64,64,.25);
      color: var(--cream);
      font-family: var(--mono);
      font-size: .78rem;
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 8px;
      pointer-events: auto;
      animation: toastIn .35s var(--ease), toastOut .35s var(--ease) 3.5s forwards;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateY(-14px); }
    }

    /* ═══════════════════════════════════════════
       LOADING SPINNER
       ═══════════════════════════════════════════ */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(240,230,200,.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      text-align: center;
      font-size: .78rem;
      color: var(--muted);
      padding: 16px 0;
    }

    /* ═══════════════════════════════════════════
       SVG SCORE RING
       ═══════════════════════════════════════════ */
    .score-ring-svg circle {
      fill: none;
      stroke-linecap: round;
    }
    .score-ring-svg .track {
      stroke: rgba(240,230,200,.08);
    }
    .score-ring-svg .fill-ring {
      stroke: var(--gold);
      transition: stroke-dashoffset 1.2s var(--ease);
    }
    .score-ring-svg text {
      font-family: var(--mono);
      font-weight: 500;
      fill: var(--gold);
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (min-width: 600px) {
      #app { padding: 40px 32px 80px; }
      .brand h1 { font-size: 4rem; }
      .brand h1::after { font-size: 4rem; }
      .sentence-fr { font-size: 1.9rem; }
    }

    /* ═══════════════════════════════════════════
       UTILS
       ═══════════════════════════════════════════ */
    .hidden { display: none !important; }
    .mt-12 { margin-top: 12px; }
    .mt-20 { margin-top: 20px; }
    .text-center { text-align: center; }
  </style>
</head>
<body>
  <div class="toast-container" id="toast-container"></div>

  <div id="app">
    <!-- ███████ HEADER ███████ -->
    <header class="brand">
      <h1>Parle</h1>
      <p class="tagline">Your French Companion</p>
    </header>

    <!-- ███████ SCREEN 1 — SCAN & LEARN ███████ -->
    <section id="screen-scan" class="screen active">
      <!-- API Key -->
      <div id="api-key-section" class="card">
        <label for="api-key-input">API Key</label>
        <div class="api-key-row">
          <input type="password" id="api-key-input" placeholder="AIza…" autocomplete="off" />
          <button id="api-key-save" type="button">Save</button>
        </div>
        <p class="api-key-status" id="api-key-status"></p>
      </div>

      <h2 class="section-title">Scan &amp; Learn</h2>
      <p class="section-sub">Upload an image containing French text to begin</p>

      <div id="drop-zone">
        <div class="drop-icon">📸</div>
        <p class="drop-text">
          Drag &amp; drop an image here<br />
          or <strong>click to browse</strong>
        </p>
        <input type="file" id="file-input" accept="image/*" />
        <img id="image-preview" alt="Uploaded preview" />
      </div>

      <div class="ocr-progress-wrap" id="ocr-progress">
        <p class="label"><span class="spinner"></span>Scanning with Tesseract…</p>
        <div class="ocr-progress-bar"><div class="fill" id="ocr-fill"></div></div>
      </div>

      <div id="words-container"></div>

      <button id="btn-start-convo" class="btn-primary hidden" disabled>
        Start Conversation
      </button>
    </section>

    <!-- ███████ SCREEN 2 — CONVERSATION ███████ -->
    <section id="screen-convo" class="screen">
      <div class="round-indicator">
        <span id="round-label">Round 1 of 5</span>
        <div class="round-dots" id="round-dots"></div>
      </div>

      <div class="divider"></div>

      <div class="sentence-display card">
        <p class="sentence-fr" id="sentence-fr"></p>
        <p class="sentence-en" id="sentence-en"></p>
      </div>

      <div class="mic-wrap">
        <button class="mic-btn" id="mic-btn" type="button" aria-label="Record pronunciation">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
      </div>
      <p class="mic-label" id="mic-label">Tap to speak</p>

      <!-- Text fallback -->
      <div class="text-fallback" id="text-fallback">
        <input type="text" id="text-input" placeholder="Type your French response…" />
        <button class="submit-text" id="submit-text" type="button">Submit</button>
      </div>

      <div class="user-transcript" id="user-transcript-wrap">
        <p class="label">You said</p>
        <p class="text" id="user-transcript"></p>
      </div>

      <div class="feedback-card" id="feedback-card">
        <div class="score-row">
          <svg class="score-ring-svg score-ring" width="56" height="56" viewBox="0 0 56 56">
            <circle class="track" cx="28" cy="28" r="22" stroke-width="5" />
            <circle class="fill-ring" id="fb-ring" cx="28" cy="28" r="22" stroke-width="5"
              stroke-dasharray="138.23" stroke-dashoffset="138.23"
              transform="rotate(-90 28 28)" />
            <text x="28" y="32" text-anchor="middle" font-size="14" id="fb-ring-text">0</text>
          </svg>
          <div>
            <p class="score-label">Fluency Score</p>
            <p class="score-value" id="fb-score-val">0</p>
          </div>
        </div>
        <p class="fb-text" id="fb-feedback"></p>
        <div class="fb-tip" id="fb-tip"></div>
      </div>

      <button id="btn-next-round" class="btn-primary btn-next-round hidden">
        Next Round →
      </button>

      <div class="loading-text hidden" id="convo-loading">
        <span class="spinner"></span> Thinking…
      </div>
    </section>

    <!-- ███████ SCREEN 3 — SUMMARY ███████ -->
    <section id="screen-summary" class="screen">
      <h2 class="section-title text-center">Session Complete</h2>
      <p class="section-sub text-center">Here's how you did</p>

      <div class="summary-hero">
        <svg class="score-ring-svg score-ring-big" width="120" height="120" viewBox="0 0 120 120">
          <circle class="track" cx="60" cy="60" r="50" stroke-width="8" />
          <circle class="fill-ring" id="summary-ring" cx="60" cy="60" r="50" stroke-width="8"
            stroke-dasharray="314.16" stroke-dashoffset="314.16"
            transform="rotate(-90 60 60)" />
          <text x="60" y="66" text-anchor="middle" font-size="28" id="summary-ring-text">0</text>
        </svg>
        <p class="big-score" id="summary-score">0</p>
        <p class="big-score-label">Average Fluency</p>
      </div>

      <div class="divider"></div>

      <ul class="summary-list" id="summary-list"></ul>

      <button id="btn-again" class="btn-primary">Session Again</button>
      <button id="btn-new-words" class="btn-secondary">New Words</button>
    </section>
  </div>

  <!-- Tesseract.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <script>
    /* ═══════════════════════════════════════════
       STATE
       ═══════════════════════════════════════════ */
    const STATE = {
      apiKey: localStorage.getItem('parle_api_key') || '',
      words: [],
      currentRound: 0,
      totalRounds: 5,
      currentSentence: '',
      currentSentenceEn: '',
      results: [], // { sentence, sentenceEn, userText, score, feedback, tip }
      isRecording: false,
    };

    const FALLBACK_WORDS = ['bonjour', 'merci', 'café', 'aujourd\'hui', 'livre', 'bonsoir', 'maison', 'école', 'jardin', 'fromage'];

    /* ═══════════════════════════════════════════
       DOM REFS
       ═══════════════════════════════════════════ */
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    const screens = {
      scan: $('#screen-scan'),
      convo: $('#screen-convo'),
      summary: $('#screen-summary'),
    };

    /* ═══════════════════════════════════════════
       TOAST
       ═══════════════════════════════════════════ */
    function showToast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      $('#toast-container').appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    /* ═══════════════════════════════════════════
       SCREEN NAVIGATION
       ═══════════════════════════════════════════ */
    function goToScreen(name) {
      Object.values(screens).forEach(s => {
        s.classList.remove('visible');
        setTimeout(() => {
          if (!s.classList.contains('visible')) s.classList.remove('active');
        }, 420);
      });

      setTimeout(() => {
        const target = screens[name];
        target.classList.add('active');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => target.classList.add('visible'));
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 200);
    }

    /* ═══════════════════════════════════════════
       API KEY
       ═══════════════════════════════════════════ */
    const apiKeyInput = $('#api-key-input');
    const apiKeyStatus = $('#api-key-status');

    if (STATE.apiKey) {
      apiKeyInput.value = STATE.apiKey;
      apiKeyStatus.textContent = '✓ Key saved';
    }

    $('#api-key-save').addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key) {
        apiKeyStatus.textContent = '✗ Please enter a key';
        apiKeyStatus.style.color = 'var(--red)';
        return;
      }
      STATE.apiKey = key;
      localStorage.setItem('parle_api_key', key);
      apiKeyStatus.textContent = '✓ Key saved';
      apiKeyStatus.style.color = 'var(--green)';
    });

    /* ═══════════════════════════════════════════
       DROP ZONE & OCR
       ═══════════════════════════════════════════ */
    const dropZone = $('#drop-zone');
    const fileInput = $('#file-input');
    const preview = $('#image-preview');
    const ocrProgress = $('#ocr-progress');
    const ocrFill = $('#ocr-fill');
    const wordsContainer = $('#words-container');
    const btnStart = $('#btn-start-convo');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => {
      if (e.target.files.length) handleFile(e.target.files[0]);
    });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showToast('Please upload an image file.');
        return;
      }

      // Preview
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);

      // OCR
      ocrProgress.style.display = 'block';
      ocrFill.style.width = '0%';
      wordsContainer.innerHTML = '';
      btnStart.classList.add('hidden');

      try {
        const worker = await Tesseract.createWorker('fra', 1, {
          logger: m => {
            if (m.status === 'recognizing text') {
              ocrFill.style.width = Math.round(m.progress * 100) + '%';
            }
          }
        });

        const { data: { text } } = await worker.recognize(file);
        await worker.terminate();

        ocrFill.style.width = '100%';

        // Extract words
        const raw = text
          .replace(/[^a-zA-ZÀ-ÿ\s'-]/g, ' ')
          .split(/\s+/)
          .map(w => w.toLowerCase().trim())
          .filter(w => w.length > 2);

        const unique = [...new Set(raw)];

        if (unique.length < 3) {
          showToast('Few words detected — using sample French vocabulary.');
          displayWords(FALLBACK_WORDS);
        } else {
          displayWords(unique.slice(0, 20));
        }
      } catch (err) {
        console.error('OCR error:', err);
        showToast('OCR failed — using sample vocabulary.');
        ocrFill.style.width = '100%';
        displayWords(FALLBACK_WORDS);
      }
    }

    function displayWords(words) {
      STATE.words = words;
      wordsContainer.innerHTML = '';
      words.forEach((w, i) => {
        const pill = document.createElement('span');
        pill.className = 'word-pill';
        pill.textContent = w;
        pill.style.animationDelay = `${i * 80}ms`;
        wordsContainer.appendChild(pill);
      });

      setTimeout(() => {
        btnStart.classList.remove('hidden');
        btnStart.disabled = false;
      }, words.length * 80 + 200);
    }

    // Use fallback words button
    btnStart.addEventListener('click', () => {
      if (!STATE.apiKey) {
        showToast('Please save your Gemini API key first.');
        return;
      }
      startConversation();
    });

    /* ═══════════════════════════════════════════
       GEMINI API
       ═══════════════════════════════════════════ */
    async function callGemini(prompt) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${STATE.apiKey}`;

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            temperature: 0.8,
            maxOutputTokens: 1024,
          }
        })
      });

      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(`Gemini API error ${res.status}: ${errBody}`);
      }

      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('No text in Gemini response');
      return text;
    }

    function extractJSON(text) {
      // Try to find JSON in the response
      const match = text.match(/\{[\s\S]*\}/);
      if (match) {
        try { return JSON.parse(match[0]); } catch {}
      }
      // Fallback: try whole string
      try { return JSON.parse(text); } catch {}
      return null;
    }

    /* ═══════════════════════════════════════════
       CONVERSATION MODE
       ═══════════════════════════════════════════ */
    async function startConversation() {
      STATE.currentRound = 0;
      STATE.results = [];
      goToScreen('convo');

      // Build round dots
      const dotsWrap = $('#round-dots');
      dotsWrap.innerHTML = '';
      for (let i = 0; i < STATE.totalRounds; i++) {
        const d = document.createElement('span');
        d.className = 'round-dot';
        dotsWrap.appendChild(d);
      }

      await generateSentence();
    }

    async function generateSentence() {
      STATE.currentRound++;
      updateRoundUI();

      $('#sentence-fr').textContent = '';
      $('#sentence-en').textContent = '';
      $('#user-transcript').textContent = '';
      $('#feedback-card').style.display = 'none';
      $('#btn-next-round').classList.add('hidden');
      $('#convo-loading').classList.remove('hidden');
      $('#mic-label').textContent = 'Tap to speak';

      const selectedWords = pickRandomWords(STATE.words, 3);

      const prompt = `You are a French language tutor. Create a single natural French sentence suitable for an intermediate learner that incorporates one or more of these French words: ${selectedWords.join(', ')}.

Respond ONLY with valid JSON in this exact format, no extra text:
{"sentence": "The French sentence", "sentence_english": "The English translation"}`;

      try {
        const raw = await callGemini(prompt);
        const parsed = extractJSON(raw);

        if (parsed && parsed.sentence) {
          STATE.currentSentence = parsed.sentence;
          STATE.currentSentenceEn = parsed.sentence_english || '';
        } else {
          // Fallback sentence
          STATE.currentSentence = `Bonjour, j'aime le ${selectedWords[0]}.`;
          STATE.currentSentenceEn = `Hello, I like ${selectedWords[0]}.`;
        }
      } catch (err) {
        console.error('Sentence gen error:', err);
        showToast('Connexion perdue — réessayez');
        STATE.currentSentence = `Bonjour, j'aime le ${selectedWords[0]}.`;
        STATE.currentSentenceEn = `Hello, I like ${selectedWords[0]}.`;
      }

      $('#convo-loading').classList.add('hidden');
      $('#sentence-fr').textContent = STATE.currentSentence;
      $('#sentence-en').textContent = STATE.currentSentenceEn;
    }

    function updateRoundUI() {
      $('#round-label').textContent = `Round ${STATE.currentRound} of ${STATE.totalRounds}`;
      const dots = $$('#round-dots .round-dot');
      dots.forEach((d, i) => {
        d.classList.remove('current', 'done');
        if (i < STATE.currentRound - 1) d.classList.add('done');
        if (i === STATE.currentRound - 1) d.classList.add('current');
      });
    }

    function pickRandomWords(arr, count) {
      const shuffled = [...arr].sort(() => Math.random() - .5);
      return shuffled.slice(0, Math.min(count, arr.length));
    }

    /* ═══════════════════════════════════════════
       SPEECH RECOGNITION
       ═══════════════════════════════════════════ */
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    const hasSpeech = !!SpeechRecognition;

    if (hasSpeech) {
      recognition = new SpeechRecognition();
      recognition.lang = 'fr-FR';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.addEventListener('result', e => {
        const transcript = e.results[0][0].transcript;
        $('#user-transcript').textContent = `"${transcript}"`;
        STATE.isRecording = false;
        $('#mic-btn').classList.remove('recording');
        $('#mic-label').textContent = 'Processing…';
        evaluateResponse(transcript);
      });

      recognition.addEventListener('error', e => {
        console.error('Speech error:', e.error);
        STATE.isRecording = false;
        $('#mic-btn').classList.remove('recording');
        if (e.error === 'no-speech') {
          $('#mic-label').textContent = 'No speech detected — try again';
        } else {
          $('#mic-label').textContent = 'Error — try again or type below';
          $('#text-fallback').style.display = 'block';
        }
      });

      recognition.addEventListener('end', () => {
        if (STATE.isRecording) {
          STATE.isRecording = false;
          $('#mic-btn').classList.remove('recording');
        }
      });
    } else {
      // No speech API — show text fallback
      document.addEventListener('DOMContentLoaded', () => {
        $('#text-fallback').style.display = 'block';
        $('#mic-btn').style.display = 'none';
        $('#mic-label').textContent = 'Speech not supported — type your response';
      });
    }

    $('#mic-btn').addEventListener('click', () => {
      if (!hasSpeech) {
        $('#text-fallback').style.display = 'block';
        return;
      }

      if (STATE.isRecording) {
        recognition.stop();
        STATE.isRecording = false;
        $('#mic-btn').classList.remove('recording');
        $('#mic-label').textContent = 'Tap to speak';
      } else {
        try {
          recognition.start();
          STATE.isRecording = true;
          $('#mic-btn').classList.add('recording');
          $('#mic-label').textContent = 'Listening…';
          $('#text-fallback').style.display = 'none';
        } catch (err) {
          console.error(err);
          showToast('Microphone access denied.');
          $('#text-fallback').style.display = 'block';
        }
      }
    });

    // Text fallback submit
    $('#submit-text').addEventListener('click', () => {
      const val = $('#text-input').value.trim();
      if (!val) return;
      $('#user-transcript').textContent = `"${val}"`;
      $('#text-input').value = '';
      evaluateResponse(val);
    });
    $('#text-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') $('#submit-text').click();
    });

    /* ═══════════════════════════════════════════
       EVALUATE RESPONSE
       ═══════════════════════════════════════════ */
    async function evaluateResponse(userText) {
      $('#convo-loading').classList.remove('hidden');
      $('#feedback-card').style.display = 'none';

      const prompt = `You are a French language fluency evaluator. A student was asked to repeat or respond to this French sentence:

Sentence: "${STATE.currentSentence}"
English: "${STATE.currentSentenceEn}"

The student said: "${userText}"

Evaluate their pronunciation attempt, grammar, vocabulary match, and overall fluency. Also generate the next practice sentence using some of these words: ${pickRandomWords(STATE.words, 3).join(', ')}.

Respond ONLY with valid JSON in this exact format, no extra text:
{"score": 75, "feedback": "Your feedback here", "tip": "An improvement tip", "next_sentence": "Next French sentence", "next_sentence_english": "English translation of next sentence"}

The score must be 0-100. Be encouraging but honest.`;

      try {
        const raw = await callGemini(prompt);
        const parsed = extractJSON(raw);

        if (parsed && typeof parsed.score === 'number') {
          showFeedback(parsed, userText);
        } else {
          // Fallback feedback
          showFeedback({
            score: 60,
            feedback: 'Good attempt! Keep practicing.',
            tip: 'Try to match the sentence more closely.',
            next_sentence: `Le ${pickRandomWords(STATE.words, 1)[0]} est magnifique.`,
            next_sentence_english: 'That is magnificent.',
          }, userText);
        }
      } catch (err) {
        console.error('Eval error:', err);
        showToast('Connexion perdue — réessayez');
        showFeedback({
          score: 50,
          feedback: 'Could not evaluate — please try again.',
          tip: 'Check your internet connection.',
          next_sentence: `J'adore le ${pickRandomWords(STATE.words, 1)[0]}.`,
          next_sentence_english: 'I love that.',
        }, userText);
      }
    }

    function showFeedback(data, userText) {
      $('#convo-loading').classList.add('hidden');

      STATE.results.push({
        sentence: STATE.currentSentence,
        sentenceEn: STATE.currentSentenceEn,
        userText,
        score: data.score,
        feedback: data.feedback,
        tip: data.tip,
      });

      // Animate score ring
      const circumference = 2 * Math.PI * 22; // r=22
      const offset = circumference - (data.score / 100) * circumference;
      $('#fb-ring').style.strokeDashoffset = offset;
      $('#fb-ring-text').textContent = data.score;
      $('#fb-score-val').textContent = data.score + '/100';
      $('#fb-feedback').textContent = data.feedback;
      $('#fb-tip').textContent = '💡 ' + data.tip;

      $('#feedback-card').style.display = 'block';
      $('#mic-label').textContent = 'Tap to speak';

      // Prepare next
      if (data.next_sentence) {
        STATE.currentSentence = data.next_sentence;
        STATE.currentSentenceEn = data.next_sentence_english || '';
      }

      if (STATE.currentRound < STATE.totalRounds) {
        $('#btn-next-round').classList.remove('hidden');
        $('#btn-next-round').textContent = `Next Round →`;
      } else {
        $('#btn-next-round').classList.remove('hidden');
        $('#btn-next-round').textContent = 'View Summary →';
      }
    }

    $('#btn-next-round').addEventListener('click', () => {
      if (STATE.currentRound >= STATE.totalRounds) {
        showSummary();
      } else {
        nextRound();
      }
    });

    function nextRound() {
      STATE.currentRound++;
      updateRoundUI();

      $('#sentence-fr').textContent = STATE.currentSentence;
      $('#sentence-en').textContent = STATE.currentSentenceEn;
      $('#user-transcript').textContent = '';
      $('#feedback-card').style.display = 'none';
      $('#btn-next-round').classList.add('hidden');

      // Reset ring
      const circumference = 2 * Math.PI * 22;
      $('#fb-ring').style.strokeDashoffset = circumference;
    }

    /* ═══════════════════════════════════════════
       SUMMARY
       ═══════════════════════════════════════════ */
    function showSummary() {
      goToScreen('summary');

      const avg = STATE.results.length
        ? Math.round(STATE.results.reduce((s, r) => s + r.score, 0) / STATE.results.length)
        : 0;

      // Animated count-up
      const scoreEl = $('#summary-score');
      const ringText = $('#summary-ring-text');
      const ring = $('#summary-ring');
      const circumference = 2 * Math.PI * 50; // r=50

      let current = 0;
      const duration = 1500;
      const start = performance.now();

      function animateScore(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        current = Math.round(eased * avg);

        scoreEl.textContent = current;
        ringText.textContent = current;
        ring.style.strokeDashoffset = circumference - (current / 100) * circumference;

        if (progress < 1) requestAnimationFrame(animateScore);
      }
      requestAnimationFrame(animateScore);

      // Build list
      const list = $('#summary-list');
      list.innerHTML = '';
      STATE.results.forEach((r, i) => {
        const li = document.createElement('li');
        li.className = 'summary-item';
        li.style.animationDelay = `${i * 100 + 400}ms`;
        li.innerHTML = `
          <p class="si-round">Round ${i + 1}</p>
          <p class="si-fr">${escapeHtml(r.sentence)}</p>
          <p class="si-user">You: "${escapeHtml(r.userText)}"</p>
          <p class="si-score">Score: ${r.score}/100</p>
        `;
        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ═══════════════════════════════════════════
       RESET / AGAIN
       ═══════════════════════════════════════════ */
    $('#btn-again').addEventListener('click', () => {
      resetApp();
    });
    $('#btn-new-words').addEventListener('click', () => {
      resetApp(true);
    });

    function resetApp(clearWords = false) {
      STATE.currentRound = 0;
      STATE.results = [];
      STATE.currentSentence = '';
      STATE.currentSentenceEn = '';

      if (clearWords) {
        STATE.words = [];
        wordsContainer.innerHTML = '';
        btnStart.classList.add('hidden');
        btnStart.disabled = true;
        preview.style.display = 'none';
        ocrProgress.style.display = 'none';
        ocrFill.style.width = '0%';
        fileInput.value = '';
      }

      // Reset summary ring
      const circumference = 2 * Math.PI * 50;
      $('#summary-ring').style.strokeDashoffset = circumference;

      goToScreen('scan');

      // If we have words already and not clearing, go straight to convo
      if (!clearWords && STATE.words.length > 0) {
        startConversation();
      }
    }

    /* ═══════════════════════════════════════════
       INIT — SHOW FIRST SCREEN
       ═══════════════════════════════════════════ */
